name: Generate SBOMs and Scan

on:
  release:
    types: [ published ]

permissions:
  contents: write
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
      DTRACK_HOST: ${{ secrets.DTRACK_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install cyclonedx-gomod
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate CycloneDX SBOM
        run: cyclonedx-gomod mod -licenses -output sbom-cyclonedx.json

      - name: Upload SBOM to Dependency-Track
        if: ${{ env.DTRACK_API_KEY != '' && env.DTRACK_HOST != '' }}
        env:
          PROJECT_NAME: ${{ github.event.repository.name }}
          PROJECT_VERSION: ${{ github.ref_name }}
        run: |
          # DTRACK_HOST carries its own scheme; require https so the API key is
          # never sent in cleartext (belt-and-suspenders with curl --proto).
          case "$DTRACK_HOST" in
            https://*) ;;
            *) echo "DTRACK_HOST must start with https://" >&2; exit 1 ;;
          esac
          # Pass the API key header via stdin so it does not appear in the
          # process list (ps) on the runner.
          printf 'X-Api-Key: %s' "$DTRACK_API_KEY" | \
            curl -sSf --proto '=https' -X POST "${DTRACK_HOST}/api/v1/bom" \
              -H @- \
              -F "autoCreate=true" \
              -F "projectName=${PROJECT_NAME}" \
              -F "projectVersion=${PROJECT_VERSION}" \
              -F "bom=@sbom-cyclonedx.json"

      - name: Generate SPDX SBOM
        run: syft . -o spdx-json > sbom-spdx.json

      - name: Scan CycloneDX SBOM
        run: grype sbom:sbom-cyclonedx.json --fail-on high --output table

      - name: Scan SPDX SBOM
        run: grype sbom:sbom-spdx.json --fail-on high --output table

      - name: Sign CycloneDX SBOM
        run: cosign sign-blob --yes sbom-cyclonedx.json --output-signature sbom-cyclonedx.json.sig

      - name: Sign SPDX SBOM
        run: cosign sign-blob --yes sbom-spdx.json --output-signature sbom-spdx.json.sig

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sbom-cyclonedx.json
            sbom-cyclonedx.json.sig
            sbom-spdx.json
            sbom-spdx.json.sig
