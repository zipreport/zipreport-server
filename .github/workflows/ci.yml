name: CI

on:
  push:
    branches:
      - development
      - main
      - master
  pull_request:
    branches:
      - development
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.12'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go fmt
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -s -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build
        run: make build

      - name: Run tests
        run: make test-integration
        timeout-minutes: 10

      - name: Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-gomod-generate-sbom@v2
        with:
          version: v1
          args: mod -licenses -json -output bom-cyclonedx.json

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: bom-spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            bom-cyclonedx.json
            bom-spdx.json
          retention-days: 90

  build-docker:
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zipreport-server:test
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-docker:
    runs-on: ubuntu-24.04
    needs: build-docker

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zipreport-server:e2e .

      - name: Run container
        run: |
          docker run -d --name zipreport-e2e \
            -p 6543:6543 \
            -e ZIPREPORT_API_KEY=test-key \
            zipreport-server:e2e
          sleep 5

      - name: E2E render test
        run: |
          HTTP_CODE=$(curl -s -o response.pdf -w "%{http_code}" \
            -X POST http://localhost:6543/v2/render \
            -H "X-Auth-Key: test-key" \
            -F "report=@test/fixtures/test.zpt" \
            -F "page_size=A4" \
            -F "margins=standard")
          [ "$HTTP_CODE" = "200" ] || (echo "Expected 200, got $HTTP_CODE"; exit 1)
          head -c 5 response.pdf | grep -q '%PDF' || (echo "Not a valid PDF"; exit 1)
          echo "E2E Docker test passed"

      - name: Cleanup
        if: always()
        run: docker rm -f zipreport-e2e
