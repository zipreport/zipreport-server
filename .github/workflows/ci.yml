name: CI

on:
  push:
    branches:
      - development
      - main
      - master
  pull_request:
    branches:
      - development
      - main
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted (run 'make fmt'):"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: make test-integration
        timeout-minutes: 10

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [ test, lint ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: make build

  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-docker:
    name: Docker Build (multi-platform)
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (multi-platform)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: zipreport-server:test
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-docker:
    name: Docker E2E
    runs-on: ubuntu-24.04
    needs: build-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t zipreport-server:e2e .

      - name: Run container
        run: |
          docker run -d --name zipreport-e2e \
            -p 6543:6543 \
            -e ZIPREPORT_API_KEY=test-key \
            zipreport-server:e2e

      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "" http://localhost:6543/ 2>/dev/null; then
              echo "Container ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Container failed to start within 30s"
              docker logs zipreport-e2e
              exit 1
            fi
            sleep 1
          done

      - name: E2E render test
        run: |
          HTTP_CODE=$(curl -s -o response.pdf -w "%{http_code}" \
            -X POST http://localhost:6543/v2/render \
            -H "X-Auth-Key: test-key" \
            -F "report=@test/fixtures/test.zpt" \
            -F "script=test.html" \
            -F "page_size=A4" \
            -F "margins=standard")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected 200, got $HTTP_CODE"
            docker logs zipreport-e2e
            exit 1
          fi
          head -c 5 response.pdf | grep -q '%PDF' || (echo "Not a valid PDF"; exit 1)
          echo "E2E Docker test passed"

      - name: Cleanup
        if: always()
        run: docker rm -f zipreport-e2e

  ci-success:
    name: CI Success
    runs-on: ubuntu-24.04
    needs: [ test, lint, build, govulncheck, build-docker, e2e-docker ]
    if: always()
    steps:
      - name: Verify all jobs passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed."
          exit 1

      - name: Success
        run: echo "All CI jobs passed."
